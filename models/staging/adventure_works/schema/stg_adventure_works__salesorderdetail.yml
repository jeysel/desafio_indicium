models:
  - name: stg_adventure_works__salesorderdetail
    description: Modelo staging para linhas de detalhe dos pedidos de venda.
    columns:
      - name: sales_order_id
        description: Chave estrangeira para salesorderheader.
      - name: sales_order_detail_id
        description: Chave primária da linha de detalhe.
      - name: carrier_tracking_number
        description: Número de rastreamento da transportadora.
      - name: order_qty
        description: Quantidade comprada do produto.
      - name: product_id
        description: Chave estrangeira para product.
      - name: unit_price
        description: Preço unitário do produto no pedido.
      - name: unit_price_discount
        description: Percentual de desconto aplicado ao preço unitário.
      - name: valor_negociado
        description: Valor bruto — unit_price * order_qty.
      - name: valor_liquido
        description: Valor líquido — unit_price * order_qty * (1 - unit_price_discount).
      - name: row_guid
        description: Identificador único global.
      - name: modified_date
        description: Data de modificação do registro.