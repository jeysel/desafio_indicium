name: 'desafio_indicium'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  desafio_indicium:
    staging:
      +materialized: view
      +schema: staging
      +tags: stg

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: int

    marts:
      +materialized: table
      +schema: marts
      +tags: marts

seeds:
  desafio_indicium:
    adventure_works:
      +schema: raw_adventure_works
      +catalog: adventure_works